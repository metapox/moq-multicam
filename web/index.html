<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>moq-multicam viewer</title>
  <style>
    body { margin: 0; background: #111; color: #fff; font-family: sans-serif; }
    h1 { text-align: center; padding: 0.5rem; margin: 0; font-size: 1.2rem; }
    .layout { display: flex; flex-direction: column; height: 100vh; }
    .focus-area { flex: 1; display: flex; align-items: center; justify-content: center; background: #000; min-height: 0; }
    .focus-area canvas { max-width: 100%; max-height: 100%; object-fit: contain; }
    .focus-label { position: absolute; top: 0.5rem; left: 0.5rem; background: rgba(0,0,0,0.6); padding: 2px 8px; border-radius: 4px; font-size: 0.9rem; }
    .focus-wrapper { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
    .thumb-strip { display: flex; gap: 4px; padding: 4px; background: #1a1a1a; overflow-x: auto; }
    .thumb { cursor: pointer; border: 2px solid transparent; border-radius: 4px; overflow: hidden; flex-shrink: 0; position: relative; }
    .thumb.active { border-color: #4af; }
    .thumb canvas { width: 160px; height: 120px; display: block; }
    .thumb label { position: absolute; bottom: 0; left: 0; right: 0; text-align: center; font-size: 0.7rem; background: rgba(0,0,0,0.6); padding: 1px; pointer-events: none; }
    .priority-badge { position: absolute; top: 2px; right: 2px; font-size: 0.6rem; padding: 1px 4px; border-radius: 2px; pointer-events: none; }
    .priority-badge.focus { background: #4a4; }
    .priority-badge.bg { background: #a84; }
    #stats { position: fixed; top: 0; right: 0; background: rgba(0,0,0,0.8); padding: 8px 12px; font-size: 0.7rem; font-family: monospace; line-height: 1.4; z-index: 10; border-bottom-left-radius: 6px; min-width: 180px; }
    #stats .label { color: #888; }
    #stats .value { color: #4f4; }
  </style>
</head>
<body>
  <div id="stats"></div>
  <div class="layout">
    <h1>moq-multicam viewer</h1>
    <div class="focus-area">
      <div class="focus-wrapper">
        <canvas id="focus-canvas"></canvas>
        <div class="focus-label" id="focus-label">—</div>
      </div>
    </div>
    <div class="thumb-strip" id="thumb-strip"></div>
  </div>

  <script type="module">
    import * as Moq from "@moq/lite";
    import { Catalog } from "@moq/hang";

    const RELAY_URL = "http://localhost:4443";
    const VEHICLE_ID = "truck-01";
    const FOCUS_PRIORITY = 0;
    const BG_PRIORITY = 200;

    const params = new URLSearchParams(location.search);
    const cameraNames = params.get("cameras")?.split(",")
      ?? ["front", "rear", "left", "right", "front-left", "front-right", "rear-left", "rear-right"];

    const connection = new Moq.Connection.Reload({ url: new URL(RELAY_URL), enabled: true });

    const cameras = [];
    let focusIndex = 0;

    const focusCanvas = document.getElementById("focus-canvas");
    const focusCtx = focusCanvas.getContext("2d");
    const focusLabel = document.getElementById("focus-label");
    const thumbStrip = document.getElementById("thumb-strip");
    const statsEl = document.getElementById("stats");

    for (const [i, name] of cameraNames.entries()) {
      const thumbCanvas = document.createElement("canvas");
      thumbCanvas.width = 320;
      thumbCanvas.height = 240;

      const div = document.createElement("div");
      div.className = "thumb" + (i === 0 ? " active" : "");
      div.appendChild(thumbCanvas);

      const label = document.createElement("label");
      label.textContent = name;
      div.appendChild(label);

      const badge = document.createElement("div");
      badge.className = "priority-badge " + (i === 0 ? "focus" : "bg");
      badge.textContent = i === 0 ? "HQ P0" : "LQ P200";
      div.appendChild(badge);

      div.addEventListener("click", () => setFocus(i));
      thumbStrip.appendChild(div);

      cameras.push({
        name, thumbCanvas, div, badge,
        decoder: null, consumer: null, broadcast: null, videoConfig: null,
        // Stats counters
        frames: 0, bytes: 0, drops: 0, lastFrameTime: 0,
      });
    }

    focusLabel.textContent = cameras[0].name;

    // Connection-level stats
    let connEstablished = null;

    let started = false;
    connection.established.watch(conn => {
      if (!conn || started) return;
      started = true;
      connEstablished = conn;
      for (const [i, cam] of cameras.entries()) {
        const isFocus = i === 0;
        startCamera(conn, cam, isFocus ? "video" : "video-low", isFocus ? FOCUS_PRIORITY : BG_PRIORITY);
      }
    });

    async function startCamera(conn, cam, trackName, priority) {
      const broadcast = conn.consume(`vehicle/${VEHICLE_ID}/camera/${cam.name}`);
      cam.broadcast = broadcast;

      const catalogTrack = broadcast.subscribe("catalog.json", 100);
      const catalog = await Catalog.fetch(catalogTrack);
      if (!catalog?.video?.renditions?.["video"]) {
        console.warn(`no video config for ${cam.name}`);
        return;
      }
      cam.videoConfig = catalog.video.renditions;
      subscribeVideo(cam, trackName, priority);
    }

    function subscribeVideo(cam, trackName, priority) {
      if (cam.abortCtrl) cam.abortCtrl.abort();
      if (cam.decoder?.state !== "closed") cam.decoder?.close();

      cam.frames = 0;
      cam.bytes = 0;
      cam.drops = 0;

      const track = cam.broadcast.subscribe(trackName, priority);

      const ctx = cam.thumbCanvas.getContext("2d");
      const decoder = new VideoDecoder({
        output(frame) {
          cam.thumbCanvas.width = frame.displayWidth;
          cam.thumbCanvas.height = frame.displayHeight;
          ctx.drawImage(frame, 0, 0);
          cam.lastFrameTime = performance.now();
          frame.close();
        },
        error(e) { console.error(`decoder error [${cam.name}]:`, e); },
      });

      decoder.configure({
        codec: cam.videoConfig[trackName].codec,
        codedWidth: cam.videoConfig[trackName].codedWidth,
        codedHeight: cam.videoConfig[trackName].codedHeight,
        optimizeForLatency: true,
      });
      cam.decoder = decoder;

      const abortCtrl = { aborted: false, abort() { this.aborted = true; track.close(); } };
      cam.abortCtrl = abortCtrl;

      (async () => {
        while (!abortCtrl.aborted) {
          const group = await track.nextGroupOrdered();
          if (!group) break;

          let keyframe = true;
          for (;;) {
            const raw = await group.readFrame();
            if (!raw) break;
            if (abortCtrl.aborted || decoder.state === "closed") break;

            const [timestamp, data] = Moq.Varint.decode(raw);

            cam.frames++;
            cam.bytes += data.byteLength;

            if (decoder.decodeQueueSize > 3) {
              cam.drops++;
              keyframe = false;
              continue;
            }

            decoder.decode(new EncodedVideoChunk({
              type: keyframe ? "key" : "delta",
              timestamp,
              data,
            }));
            keyframe = false;
          }
        }
      })();
    }

    function setFocus(index) {
      if (index === focusIndex) return;
      const prev = cameras[focusIndex];
      const next = cameras[index];

      if (prev.videoConfig) subscribeVideo(prev, "video-low", BG_PRIORITY);
      if (next.videoConfig) subscribeVideo(next, "video", FOCUS_PRIORITY);

      prev.div.classList.remove("active");
      prev.badge.className = "priority-badge bg";
      prev.badge.textContent = "LQ P200";

      next.div.classList.add("active");
      next.badge.className = "priority-badge focus";
      next.badge.textContent = "HQ P0";

      focusLabel.textContent = next.name;
      focusIndex = index;
    }

    // Mirror focused camera to focus canvas
    function mirrorFocus() {
      const cam = cameras[focusIndex];
      if (cam?.thumbCanvas.width) {
        focusCanvas.width = cam.thumbCanvas.width;
        focusCanvas.height = cam.thumbCanvas.height;
        focusCtx.drawImage(cam.thumbCanvas, 0, 0);
      }
      requestAnimationFrame(mirrorFocus);
    }
    requestAnimationFrame(mirrorFocus);

    // Stats UI — update every second
    let prevStats = cameras.map(() => ({ frames: 0, bytes: 0 }));

    setInterval(() => {
      const focus = cameras[focusIndex];
      const now = performance.now();

      // Per-camera FPS and bitrate (delta since last update)
      const lines = [];

      // Connection stats
      const rtt = connEstablished?.rtt?.peek?.();
      const bw = connEstablished?.recvBandwidth?.peek?.();
      lines.push(`<span class="label">RTT:</span> <span class="value">${rtt != null ? rtt.toFixed(0) + ' ms' : '—'}</span>`);
      lines.push(`<span class="label">Recv BW:</span> <span class="value">${bw != null ? (bw / 1e6).toFixed(1) + ' Mbps' : '—'}</span>`);
      lines.push('');

      // Focus camera detail
      const fp = prevStats[focusIndex];
      const fFps = focus.frames - fp.frames;
      const fBitrate = ((focus.bytes - fp.bytes) * 8) / 1000;
      const fQueue = focus.decoder?.decodeQueueSize ?? 0;
      const fAge = focus.lastFrameTime ? (now - focus.lastFrameTime).toFixed(0) : '—';

      lines.push(`<span class="label">Focus:</span> <span class="value">${focus.name}</span>`);
      lines.push(`<span class="label">  FPS:</span> <span class="value">${fFps}</span>`);
      lines.push(`<span class="label">  Bitrate:</span> <span class="value">${fBitrate.toFixed(0)} kbps</span>`);
      lines.push(`<span class="label">  Queue:</span> <span class="value">${fQueue}</span>`);
      lines.push(`<span class="label">  Drops:</span> <span class="value">${focus.drops}</span>`);
      lines.push(`<span class="label">  Last frame:</span> <span class="value">${fAge} ms ago</span>`);
      lines.push('');

      // Summary for all cameras
      let totalFps = 0, totalDrops = 0;
      for (const [i, cam] of cameras.entries()) {
        const p = prevStats[i];
        totalFps += cam.frames - p.frames;
        totalDrops += cam.drops;
        prevStats[i] = { frames: cam.frames, bytes: cam.bytes };
      }
      lines.push(`<span class="label">Total FPS:</span> <span class="value">${totalFps} (${cameras.length} cams)</span>`);
      lines.push(`<span class="label">Total drops:</span> <span class="value">${totalDrops}</span>`);

      statsEl.innerHTML = lines.join('<br>');
    }, 1000);
  </script>
</body>
</html>
