<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>moq-multicam viewer</title>
  <style>
    body { margin: 0; background: #111; color: #fff; font-family: sans-serif; }
    h1 { text-align: center; padding: 1rem; margin: 0; font-size: 1.2rem; }
    .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; padding: 8px; }
    .cam { background: #222; border-radius: 4px; overflow: hidden; }
    .cam label { display: block; text-align: center; padding: 4px; font-size: 0.8rem; opacity: 0.7; }
    canvas { max-width: 640px; height: auto; }
  </style>
</head>
<body>
  <h1>moq-multicam viewer</h1>
  <div class="grid" id="camera-grid"></div>

  <script type="module">
    import "@moq/watch/element";

    const RELAY_URL = "http://localhost:4443";
    const VEHICLE_ID = "truck-01";

    // Camera list (static for now; will be replaced by manifest subscription)
    const cameras = ["front", "rear"];

    const grid = document.getElementById("camera-grid");

    for (const cam of cameras) {
      const div = document.createElement("div");
      div.className = "cam";

      const label = document.createElement("label");
      label.textContent = cam;
      div.appendChild(label);

      const watch = document.createElement("moq-watch");
      watch.setAttribute("url", RELAY_URL);
      watch.setAttribute("name", `vehicle/${VEHICLE_ID}/camera/${cam}`);

      const canvas = document.createElement("canvas");
      watch.appendChild(canvas);
      div.appendChild(watch);

      grid.appendChild(div);
    }
  </script>
</body>
</html>
