name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout moq-fork
        run: git clone --depth 1 --branch feat/subscribe-update-api https://github.com/metapox/moq.git ../moq-fork

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config cmake

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace --features openh264 -- -D warnings

      - name: Test
        run: cargo test --workspace --features openh264
