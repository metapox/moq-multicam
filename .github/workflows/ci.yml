name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout moq-fork
        run: |
          git clone --depth 1 --branch feat/subscribe-update-api https://github.com/metapox/moq.git ../moq-fork
          cd ../moq-fork && git fetch --depth 1 origin b1455e7e6bc1941eb67f307501b33643b9bfe864 && git checkout b1455e7e6bc1941eb67f307501b33643b9bfe864

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config cmake

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace --features openh264 -- -D warnings

      - name: Test
        run: cargo test --workspace --features openh264

      - name: Security audit
        run: |
          curl -LsSf https://github.com/rustsec/rustsec/releases/download/cargo-audit%2Fv0.22.1/cargo-audit-x86_64-unknown-linux-gnu-v0.22.1.tgz | tar xzf - --strip-components=1 -C ~/.cargo/bin
          cargo audit --ignore RUSTSEC-2025-0008 --ignore RUSTSEC-2024-0436 --ignore RUSTSEC-2025-0134
