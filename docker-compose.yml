services:
  relay:
    build:
      context: ../moq-fork
      dockerfile: Dockerfile.relay
    ports:
      - "4443:4443/tcp"
      - "4443:4443/udp"
    volumes:
      - ./auth:/auth:ro
    command: >
      --server-bind [::]:4443
      --tls-generate localhost
      --tls-disable-verify
      --auth-key /auth/server.pub.jwk
      --auth-public-subscribe ""
      --web-http-listen [::]:4443

  publisher:
    build:
      context: ..
      dockerfile: moq-multicam/Dockerfile
      target: runtime-openh264
    depends_on: [relay]
    cap_add: [NET_ADMIN]
    command: >
      publish
      --relay https://relay:4443
      --jwt ${MOQ_JWT}
      --camera front --camera rear
      ${EXTRA_CAMERAS:+--camera left --camera right
      --camera front-left --camera front-right --camera rear-left --camera rear-right}
      --source ${VIDEO_SOURCE:-openh264}
      --video-dir /videos
      --tls-disable-verify
    volumes:
      - ./videos:/videos:ro

  web:
    image: node:20-slim
    working_dir: /app
    volumes:
      - ./web:/app
      - ../moq-fork/js/lite/dist:/moq-lite-dist:ro
    ports:
      - "5173:5173"
    command: sh -c "npm install && rm -rf node_modules/@moq/lite node_modules/@moq/hang/node_modules/@moq/lite node_modules/.vite && cp -r /moq-lite-dist node_modules/@moq/lite && cp -r /moq-lite-dist node_modules/@moq/hang/node_modules/@moq/lite && npx vite --host"
