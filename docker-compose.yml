services:
  relay:
    build:
      context: .
      target: relay
    ports:
      - "4443:4443"
    command: >
      --server-bind [::]:4443
      --tls-generate localhost
      --tls-disable-verify
      --auth-public ""
      --web-http-listen [::]:4443

  publisher:
    build:
      context: .
      target: runtime
    depends_on: [relay]
    command: >
      publish-fmp4
      --relay https://relay:4443
      --camera front --camera rear
      --source gstreamer
      --tls-disable-verify

  web:
    image: node:22-slim
    working_dir: /app
    volumes:
      - ./web:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npx vite --host"
