services:
  relay:
    build:
      context: .
      target: relay
    ports:
      - "4443:4443/tcp"
      - "4443:4443/udp"
    command: >
      --server-bind [::]:4443
      --tls-generate localhost
      --tls-disable-verify
      --auth-public ""
      --web-http-listen [::]:4443

  publisher:
    build:
      context: .
      target: runtime
    depends_on: [relay]
    command: >
      publish-fmp4
      --relay https://relay:4443
      --camera front --camera rear --camera left --camera right
      --camera front-left --camera front-right --camera rear-left --camera rear-right
      --source gstreamer
      --tls-disable-verify

  # Lightweight publisher using openh264 (no GStreamer required)
  publisher-openh264:
    build:
      context: .
      target: runtime-openh264
    depends_on: [relay]
    profiles: [openh264]
    command: >
      publish-fmp4
      --relay https://relay:4443
      --camera front --camera rear --camera left --camera right
      --camera front-left --camera front-right --camera rear-left --camera rear-right
      --source openh264
      --tls-disable-verify

  web:
    image: node:22-slim
    working_dir: /app
    volumes:
      - ./web:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npx vite --host"
